server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache de larga duración para assets con hash (Vite los genera con hash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback a index.html para React Router (client-side routing)
    # Sin esto, rutas como /login o /dashboard devuelven 404 en acceso directo
    location / {
        try_files $uri $uri/ /index.html;
    }
}
